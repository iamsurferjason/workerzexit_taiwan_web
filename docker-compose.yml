version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: workerzexit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: workerzexit
      POSTGRES_PASSWORD: workerzexit2024
      POSTGRES_DB: workerzexit_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workerzexit -d workerzexit_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    # 這裡改成直接使用您在 Docker Hub 上的成品鏡像
    image: iamsurferjason/workerzexit_app:latest
    container_name: workerzexit_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://workerzexit:workerzexit2024@postgres:5432/workerzexit_db
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://workerzexittw.orka-hw.com}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-workerzexit-taiwan-secret-change-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@workerzexit.tw}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-WorkerzExit2024!}
      ADMIN_NAME: ${ADMIN_NAME:-超級管理員}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      NODE_ENV: production

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: workerzexit_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-eyJhIjoiMDk0ZmMxZWE4ZDcxYmM1NzQyN2JlOGRlZjQ1Njg0OTYiLCJ0IjoiYTBiNDk2NzQtYWZjYS00ZjA4LWJhMTUtOWY4NTM3ZjY4OGQ2IiwicyI6Ik9HRXlOemd4Wm1RdE5UazNZaTAwT1RJMUxXSXlOMk10TURaak5EUmhZVEZqWldFMSJ9}
    depends_on:
      - app

volumes:
  postgres_data:
